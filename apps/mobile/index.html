<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <script>
      // Expose the iOS soft-keyboard height as --keyboard-inset so the composer
      // and thread bottom-clearance can react. visualViewport shrinks when the
      // keyboard opens; layoutViewport (innerHeight) does not.
      (function () {
        var vv = window.visualViewport;
        if (!vv) return;
        function update() {
          var inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
          document.documentElement.style.setProperty('--keyboard-inset', inset + 'px');
        }
        vv.addEventListener('resize', update);
        vv.addEventListener('scroll', update);
        window.addEventListener('load', update);
        update();
      })();
    </script>
    <title>Hermes</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
      }

      body {
        background: #f7f8fb;
        color: #202126;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }

      .mobile-setup-shell {
        min-height: 100%;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top left, rgba(35, 102, 255, 0.18), transparent 34rem),
          linear-gradient(180deg, #fbfcff 0%, #f3f5fb 100%);
      }

      .mobile-setup-card {
        width: min(100%, 430px);
        border: 1px solid rgba(22, 25, 35, 0.08);
        border-radius: 28px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 28px 80px rgba(28, 36, 64, 0.16);
        backdrop-filter: blur(18px);
      }

      .mobile-setup-kicker {
        margin: 0 0 8px;
        color: #0b5cff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .mobile-setup-card h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.06;
        letter-spacing: -0.04em;
      }

      .mobile-setup-card p {
        margin: 12px 0 0;
        color: #737680;
        font-size: 15px;
        line-height: 1.5;
      }

      .mobile-setup-form {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      .mobile-setup-field {
        display: grid;
        gap: 7px;
      }

      .mobile-setup-field span {
        font-size: 12px;
        font-weight: 700;
        color: #4b4e57;
      }

      .mobile-setup-field input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(31, 35, 48, 0.14);
        border-radius: 14px;
        padding: 14px 13px;
        background: rgba(248, 249, 252, 0.9);
        color: #1d2028;
        font: inherit;
        outline: none;
      }

      .mobile-setup-field input:focus {
        border-color: #0b5cff;
        box-shadow: 0 0 0 4px rgba(11, 92, 255, 0.12);
      }

      .mobile-setup-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .mobile-setup-button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 750;
      }

      .mobile-setup-button.primary {
        background: #0b5cff;
        color: white;
      }

      .mobile-setup-button.secondary {
        background: #e9edf6;
        color: #20242f;
      }

      .mobile-setup-hint {
        margin-top: 16px;
        padding: 12px 13px;
        border-radius: 16px;
        background: rgba(11, 92, 255, 0.08);
        color: #526079;
        font-size: 12px;
        line-height: 1.45;
      }

      .mobile-setup-error {
        display: none;
        margin-top: 12px;
        border: 1px solid rgba(213, 41, 82, 0.24);
        border-radius: 14px;
        padding: 11px 12px;
        background: rgba(213, 41, 82, 0.08);
        color: #c72b55;
        font-size: 13px;
      }
    </style>
    <script>
      (function () {
        const noop = function () {};
        const unsub = function () {};
        const ok = async function () { return {}; };
        const falseStatus = async function () { return { available: false }; };
        const readyProgress = { stage: 'ready', message: 'Ready', progress: 1, percent: 100, at: Date.now() };
        const DEFAULT_DASHBOARD_URL = window.__HERMES_DASHBOARD_URL__ || '';

        function cleanBaseUrl(value) {
          const trimmed = String(value || '').trim().replace(/\/+$/, '');
          return trimmed || DEFAULT_DASHBOARD_URL;
        }

        function readConnection() {
          return {
            baseUrl: cleanBaseUrl(window.__HERMES_DASHBOARD_URL__ || localStorage.getItem('hermesDashboardUrl')),
            token: String(window.__HERMES_DASHBOARD_TOKEN__ || localStorage.getItem('hermesDashboardToken') || '').trim(),
            profile: String(localStorage.getItem('hermesDashboardProfile') || 'default').trim() || 'default'
          };
        }

        function saveConnection(next) {
          localStorage.setItem('hermesDashboardUrl', cleanBaseUrl(next.baseUrl));
          localStorage.setItem('hermesDashboardToken', String(next.token || '').trim());
          localStorage.setItem('hermesDashboardProfile', String(next.profile || 'default').trim() || 'default');
        }

        function clearConnection() {
          localStorage.removeItem('hermesDashboardUrl');
          localStorage.removeItem('hermesDashboardToken');
          localStorage.removeItem('hermesDashboardProfile');
        }

        function toWsUrl(baseUrl, token) {
          const cleanUrl = cleanBaseUrl(baseUrl);
          if (!cleanUrl) return '';
          const url = new URL('/api/ws', cleanUrl);
          url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
          if (token) url.searchParams.set('token', token);
          return url.toString();
        }

        function disposable() {
          const fn = function () {};
          fn.destroy = noop;
          fn.dispose = noop;
          fn.unsubscribe = noop;
          fn.remove = noop;
          return fn;
        }

        function callableObject(methods) {
          const target = function () { return disposable(); };
          Object.assign(target, methods || {});
          return new Proxy(target, {
            get(obj, prop) {
              if (prop in obj) return obj[prop];
              if (typeof prop === 'string' && (prop.startsWith('on') || prop.startsWith('add') || prop.startsWith('watch') || prop.startsWith('subscribe'))) return function () { return disposable(); };
              if (typeof prop === 'string' && (prop.startsWith('get') || prop.startsWith('check') || prop.startsWith('list') || prop.startsWith('read'))) return ok;
              return function () { return disposable(); };
            },
            apply() { return disposable(); }
          });
        }

        function pathWithProfile(path, profile) {
          if (!profile) return path;
          const url = new URL(path, 'https://hermes.invalid');
          if (!url.searchParams.has('profile')) url.searchParams.set('profile', profile);
          return url.pathname + url.search + url.hash;
        }

        const nativeApiPending = new Map();
        let nativeApiSeq = 0;

        window.addEventListener('message', function (event) {
          let msg = null;
          try { msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; } catch (_) {}
          if (!msg || msg.type !== 'hermes:api:result' || !msg.id) return;
          const pending = nativeApiPending.get(msg.id);
          if (!pending) return;
          nativeApiPending.delete(msg.id);
          clearTimeout(pending.timer);
          if (msg.ok) pending.resolve(msg.data);
          else pending.reject(new Error(msg.error || 'Native Hermes API request failed'));
        });
        document.addEventListener('message', function (event) {
          window.dispatchEvent(new MessageEvent('message', { data: event.data }));
        });

        function canUseNativeApiBridge() {
          return Boolean(window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === 'function');
        }

        function nativeApiRequest(request) {
          const timeoutMs = request.timeoutMs || 30000;
          const id = 'api-' + (++nativeApiSeq);
          return new Promise(function (resolve, reject) {
            const timer = setTimeout(function () {
              nativeApiPending.delete(id);
              reject(new Error(request.method + ' ' + request.path + ' timed out after ' + timeoutMs + 'ms'));
            }, timeoutMs + 1000);
            nativeApiPending.set(id, { resolve: resolve, reject: reject, timer: timer });
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'hermes:api', id: id, request: request }));
          });
        }

        async function dashboardFetch(path, init) {
          const conn = readConnection();
          const method = String((init && init.method) || 'GET').toUpperCase();
          const timeoutMs = init && Number(init.timeoutMs) > 0 ? Number(init.timeoutMs) : 30000;
          const requestPath = pathWithProfile(path, init && init.profile);

          if (canUseNativeApiBridge()) {
            return nativeApiRequest({
              baseUrl: conn.baseUrl,
              token: conn.token,
              method: method,
              path: requestPath,
              body: init && init.body !== undefined ? init.body : undefined,
              timeoutMs: timeoutMs
            });
          }

          const headers = { accept: 'application/json' };
          if (init && init.body !== undefined) headers['content-type'] = 'application/json';
          if (conn.token) {
            headers['X-Hermes-Session-Token'] = conn.token;
            headers.authorization = 'Bearer ' + conn.token;
          }

          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), timeoutMs);
          const requestUrl = conn.baseUrl + requestPath;

          try {
            const res = await fetch(requestUrl, {
              method,
              body: init && init.body !== undefined ? init.body : undefined,
              signal: controller.signal,
              headers: { ...headers, ...(init && init.headers ? init.headers : {}) }
            });
            const text = await res.text();
            if (!res.ok) throw new Error('Hermes API ' + res.status + ' ' + requestPath + (text ? ': ' + text.slice(0, 240) : ''));
            if (!text) return {};
            try { return JSON.parse(text); } catch (_) { return text; }
          } catch (err) {
            const message = err && err.name === 'AbortError' ? 'timed out after ' + timeoutMs + 'ms' : (err && err.message ? err.message : String(err));
            throw new Error(method + ' ' + requestPath + ' failed: ' + message);
          } finally {
            clearTimeout(timer);
          }
        }

        const nativeDesktop = window.hermesDesktop || {};
        const fallback = callableObject({
          api: async function(req) {
            const path = req && req.path ? req.path : '/api/status';
            return dashboardFetch(path, {
              method: req.method || (req.body ? 'POST' : 'GET'),
              profile: req.profile || null,
              timeoutMs: req.timeoutMs || 0,
              body: req.body ? JSON.stringify(req.body) : undefined
            });
          },
          applyConnectionConfig: async function(config) {
            if (config && config.mode === 'local') {
              clearConnection();
              window.__HERMES_MOBILE_NEEDS_SETUP__ = true;
            } else if (config && (config.remoteUrl || config.url || config.baseUrl)) {
              saveConnection({
                baseUrl: config.remoteUrl || config.url || config.baseUrl,
                token: config.token || config.sessionToken || '',
                profile: config.profile || 'default'
              });
            }
            window.location.reload();
            return { ok: true };
          },
          probeConnectionConfig: async function(url) {
            const base = cleanBaseUrl(url);
            return { ok: true, reachable: true, baseUrl: base, providers: null, mobileBypass: true };
          },
          resetMobileConnection: async function() { clearConnection(); window.location.reload(); },
          getBootstrapState: async () => ({
            active: false,
            manifest: null,
            stages: {},
            error: null,
            log: [],
            startedAt: null,
            completedAt: null,
            unsupportedPlatform: null
          }),
          onBootstrapEvent: () => disposable(),
          getVersion: async () => 'mobile-vite',
          getBootProgress: async () => readyProgress,
          onBootProgress: function (cb) { try { cb && cb(readyProgress); } catch (_) {} return unsub; },
          getConnection: async () => {
            const conn = readConnection();
            return { mode: 'remote', profile: conn.profile, platform: 'ios', authMode: 'token', wsUrl: toWsUrl(conn.baseUrl, conn.token), isFullscreen: true, nativeOverlayWidth: 0 };
          },
          getConnectionConfig: async () => {
            const conn = readConnection();
            return { mode: 'remote', profile: conn.profile, remoteUrl: conn.baseUrl, url: conn.baseUrl, authMode: 'token', configured: Boolean(conn.token) };
          },
          getGatewayWsUrl: async () => {
            const conn = readConnection();
            return toWsUrl(conn.baseUrl, conn.token);
          },
          openExternal: async (url) => { location.href = url; },
          fetchLinkTitle: async () => '',
          openSessionWindow: async (sessionId) => { location.hash = '#/sessions/' + sessionId; },
          openNewSessionWindow: async () => { location.hash = '#/new'; },
          sanitizeWorkspaceCwd: async (cwd) => cwd || '',
          setTranslucency: async () => {},
          touchBackend: async () => {},
          notify: async () => {},
          onBackendExit: () => unsub,
          onBackendOutput: () => unsub,
          onMenuCommand: () => unsub,
          onOpenSettings: () => unsub,
          onProtocolUrl: () => unsub,
          petOverlay: callableObject({
            open: async (request) => ({ bounds: request && request.bounds ? request.bounds : { x: 0, y: 0, width: 240, height: 300 } }),
            close: async () => {},
            pushState: noop,
            control: noop,
            onState: () => disposable(),
            onControl: () => disposable()
          }),
          profile: callableObject({ set: async () => {}, get: ok }),
          settings: callableObject({ getDefaultProjectDir: async () => '' }),
          updates: callableObject({
            check: falseStatus,
            checkBackend: falseStatus,
            getVersion: async () => 'mobile-vite',
            onProgress: () => unsub,
            onStatus: () => unsub,
            apply: async () => ({ ok: false, message: 'Updates unavailable on mobile shell' })
          })
        });

        // Native bridge methods (e.g. `api`) take priority; anything missing
        // (readDesktopDir, getBootstrapState, etc.) falls through to the inline
        // callable so the renderer never trips an unhandled rejection.
        const desktop = new Proxy(nativeDesktop, {
          get(target, prop) {
            if (prop in target) return target[prop];
            return fallback[prop];
          }
        });

        window.hermesDesktop = desktop;
        window.desktop = desktop;
        window.__HERMES_MOBILE_SHELL__ = true;
        window.__HERMES_MOBILE_CONNECTION__ = { readConnection, saveConnection, clearConnection, toWsUrl };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const conn = window.__HERMES_MOBILE_CONNECTION__.readConnection();
        const shouldShowSetup = Boolean(window.__HERMES_MOBILE_FORCE_SETUP__) || !String(conn.token || '').trim();

        function renderSetup(message) {
          document.getElementById('root').innerHTML =
            '<main class="mobile-setup-shell">' +
              '<section class="mobile-setup-card">' +
                '<p class="mobile-setup-kicker">Hermes</p>' +
                '<h1>Connect to gateway</h1>' +
                '<p>Enter your Hermes gateway URL and dashboard session token to continue.</p>' +
                '<form class="mobile-setup-form" id="mobile-setup-form">' +
                  '<label class="mobile-setup-field"><span>Gateway URL</span><input id="mobile-setup-url" inputmode="url" autocomplete="url" placeholder="https://your-hermes-gateway.example.com" /></label>' +
                  '<label class="mobile-setup-field"><span>Dashboard session token</span><input id="mobile-setup-token" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Paste token from Hermes dashboard process" /></label>' +
                  '<label class="mobile-setup-field"><span>Profile</span><input id="mobile-setup-profile" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="default" /></label>' +
                  '<div class="mobile-setup-row"><button class="mobile-setup-button primary" type="submit">Connect</button><button class="mobile-setup-button secondary" type="button" id="mobile-setup-public">Test public status</button></div>' +
                '</form>' +
                '<div class="mobile-setup-error" id="mobile-setup-error"></div>' +
                '<div class="mobile-setup-hint">Hermes Desktop injects this automatically in Electron. On phones we need an explicit first-run connection step. WebSocket streaming uses <code>/api/ws?token=…</code>; REST uses <code>X-Hermes-Session-Token</code>.</div>' +
              '</section>' +
            '</main>';

          const url = document.getElementById('mobile-setup-url');
          const token = document.getElementById('mobile-setup-token');
          const profile = document.getElementById('mobile-setup-profile');
          const error = document.getElementById('mobile-setup-error');
          url.value = conn.baseUrl;
          token.value = conn.token;
          profile.value = conn.profile || 'default';

          function setError(text) {
            error.textContent = text || '';
            error.style.display = text ? 'block' : 'none';
          }

          setError(message || '');

          document.getElementById('mobile-setup-public').addEventListener('click', async function () {
            setError('Public browser-side status checks are skipped on iPhone; tap Connect to save these details and let the native bridge test authenticated REST/WebSocket.');
          });

          document.getElementById('mobile-setup-form').addEventListener('submit', async function (event) {
            event.preventDefault();
            setError('');
            const next = {
              baseUrl: url.value,
              token: token.value,
              profile: profile.value || 'default'
            };

            if (!String(next.token || '').trim()) {
              setError('Paste a dashboard session token first. Public status alone is not enough for sessions/WebSocket.');
              return;
            }

            window.__HERMES_MOBILE_CONNECTION__.saveConnection(next);
            window.__HERMES_MOBILE_FORCE_SETUP__ = false;
            window.location.reload();
          });
        }

        window.__HERMES_MOBILE_SHOW_SETUP__ = shouldShowSetup;

        if (shouldShowSetup) {
          renderSetup();
        }
      })();
    </script>
    <script type="module">
      if (!window.__HERMES_MOBILE_SHOW_SETUP__) {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
